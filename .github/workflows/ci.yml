name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # setup-uv publishes no moving major tag for v8 (only exact v8.x.y), so
      # this is pinned to the exact latest; bump it when a newer release lands.
      # uv cache intentionally NOT enabled — the bundled cache saves in a
      # post-step that runs even on failed runs and can poison main; deps here
      # are small, so a clean install each run is cheaper than the risk.
      - uses: astral-sh/setup-uv@v8.3.2

      # Core deps only — spotDL is mocked in the tests, so the heavy `download`
      # extra isn't needed. A couple of download tests touch the mutagen-backed
      # coverage scan, so that step adds just mutagen via `uv run --with`.
      - name: Install dependencies
        run: uv sync

      - name: Matching + archive tests
        run: uv run test_matching.py

      - name: N-way reconcile tests
        run: uv run test_reconcile.py

      - name: Download-mirror tests
        run: uv run --with mutagen python test_downloads.py
